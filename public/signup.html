<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Sign Up - CineVerse</title>
  
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  
  <style>
    /* MODULE: RESET CSS  */
    /*  Xóa margin/padding mặc định của trình duyệt để giao diện đồng nhất trên mọi trình duyệt */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* MODULE: Body = */
    /* Thiết lập nền  */
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0c10;
      color: #eef2ff;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0f1a, #000);
      padding: 20px;
    }

    /* Logo ở góc trên bên trái */
    .corner-logo {
      position: fixed;
      top: 24px;
      left: 30px;
      z-index: 100;
      background: #000;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 1px solid #dc2626;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s;
    }
    .corner-logo:hover {
      transform: scale(1.05);
      border-color: #ef4444;
    }
    .corner-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 50% 50%;
    }

    /*  CLASS: signup-container  */

    /* Signup Contai ner */

    .signup-container {
      width: 100%;
      max-width: 550px;
      margin: 0 auto;
      position: relative;
      z-index: 10;
    }

    /* CLASS: signup-card  */
    /* Card chính */
    .signup-card {
      background: rgba(17, 17, 27, 0.9);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(220, 38, 38, 0.3);
      animation: borderPulse 3s infinite ease-in-out;
    }

    /*  FUNCTION: borderPulse  */
    
    @keyframes borderPulse {
      0% { box-shadow: 0 0 0 1px #dc2626, 0 0 15px 3px rgba(220, 38, 38, 0.3); }
      50% { box-shadow: 0 0 0 2px #dc2626, 0 0 25px 5px rgba(220, 38, 38, 0.4); }
      100% { box-shadow: 0 0 0 1px #dc2626, 0 0 15px 3px rgba(220, 38, 38, 0.3); }
    }

    /*  CLASS: card-header-bar  */
    
    .card-header-bar {
      height: 4px;
      background: linear-gradient(90deg, #dc2626, #ef4444, #dc2626);
    }

    /*  CLASS: card-content  */
    /* Phần nội dung bên trong card, chứa form và các thành phần */
    .card-content {
      padding: 32px 28px;
    }

    /*  CLASS: back-btn  */
    /* Nút quay lại trang chủ, có hiệu ứng di chuyển sang trái khi hover */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: none;
      color: #f87171;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 24px;
      transition: all 0.3s;
      font-weight: 500;
    }

    .back-btn:hover {
      color: #ef4444;
      transform: translateX(-4px);
    }

    /*  CLASS: signup-header  */
    /* Phần tiêu đề của form đăng ký, bao gồm icon và chữ JOIN OUR CINEMA */
    .signup-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .signup-header h2 {
      font-size: 28px;
      font-family: 'Bebas Neue', cursive;
      letter-spacing: 2px;
      color: white;
    }

    /*  MODULE: Form Styles  */
    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #fca5a5;
      font-family: 'Bebas Neue', cursive;
      letter-spacing: 1px;
    }

    .input-wrapper {
      position: relative;
    }

    /*  CLASS: input-wrapper input  */
    /* Style cho ô nhập liệu  */
    .input-wrapper input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(31, 33, 43, 0.6);
      border: 1px solid #374151;
      border-radius: 12px;
      color: white;
      font-size: 14px;
      transition: all 0.2s;
    }

    /*  PSEUDO-CLASS: input:focus  */
    /* Hiệu ứng khi focus vào ô input  */
    .input-wrapper input:focus {
      outline: none;
      border-color: #ef4444;
      box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.2);
    }

    /*  CLASS: form-row  */
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    
    @media (min-width: 768px) {
      .form-row {
        grid-template-columns: 1fr 1fr;
      }
    }

    /*  CLASS: submit-btn  */
    /* Nút đăng ký  */
    .submit-btn {
      width: 100%;
      background: linear-gradient(135deg, #dc2626, #991b1b);
      border: none;
      padding: 14px;
      border-radius: 40px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      font-size: 16px;
      font-family: 'Bebas Neue', cursive;
      letter-spacing: 1px;
      transition: all 0.3s;
      margin-top: 10px;
    }

    .submit-btn:hover {
      opacity: 0.9;
      transform: scale(1.02);
    }

    /*  CLASS: login-link  */
    /* Link chuyển hướng đến trang đăng nhập cho người đã có tài khoản */
    .login-link {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: #9ca3af;
    }

    .login-link a {
      color: #f87171;
      text-decoration: none;
      font-weight: 500;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .card-content {
        padding: 24px 20px;
      }
      .signup-header h2 {
        font-size: 24px;
      }
      .corner-logo {
        top: 16px;
        left: 16px;
        width: 44px;
        height: 44px;
      }
    }
  </style>
</head>
<body>
  <!-- Logo ở góc trên bên trái -->
  <div class="corner-logo" onclick="window.location.href='index.html'">
    <img src="picture/logo.jpg" alt="Logo">
  </div>

  <div class="signup-container">
    <div class="signup-card">
      <div class="card-header-bar"></div>
      <div class="card-content">
        
       
        <!-- FUNCTION: window.location.href - chuyển hướng trình duyệt về trang index.html (trang chủ) -->
        <button class="back-btn" onclick="window.location.href='index.html'">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="m12 19-7-7 7-7"></path>
            <path d="M19 12H5"></path>
          </svg>
          BACK
        </button>

       
        <div class="signup-header">
          <div class="flex justify-center items-center mb-3" style="display: flex; justify-content: center; align-items: center; margin-bottom: 12px;">
         
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-ticket text-red-400 mr-2" aria-hidden="true" style="margin-right: 8px;">
              <path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"></path>
              <path d="M13 5v2"></path>
              <path d="M13 17v2"></path>
              <path d="M13 11v2"></path>
            </svg>
            <h2 class="text-3xl font-bold text-white font-cinema" style="font-size: 28px; font-weight: 700; color: white; font-family: 'Bebas Neue', cursive; letter-spacing: 2px;">JOIN OUR CINEMA</h2>
          </div>
          <p style="color: #fca5a5; font-size: 14px;">Create your account and start your cinematic journey</p>
        </div>

        <!--  FORM: signupForm  -->
        <!-- FILE: signup.html - Form đăng ký tài khoản chính của hệ thống -->
        <form id="registerForm">
          
        
          <div class="form-row">
           
            <div class="form-group">
              <label>FULL NAME</label>
              <div class="input-wrapper">
                <input type="text" id="fullName" placeholder="Enter your full name" required>
              </div>
            </div>
          
            <div class="form-group">
              <label>USERNAME</label>
              <div class="input-wrapper">
                <input type="text" id="username" placeholder="Choose a username" required>
              </div>
            </div>
          </div>

          <!--   Email và Số điện thoại  -->
          <div class="form-row">
           
            <div class="form-group">
              <label>EMAIL ADDRESS</label>
              <div class="input-wrapper">
                <input type="email" id="email" placeholder="your@email.com" required>
              </div>
            </div>
          
            <div class="form-group">
              <label>PHONE NUMBER</label>
              <div class="input-wrapper">
                <input type="tel" id="phone" placeholder="+1 (555) 123-4567" required>
              </div>
            </div>
          </div>

          <!--   Ngày sinh và Mật khẩu  -->
          <div class="form-row">
           
            <div class="form-group">
              <label>DATE OF BIRTH</label>
              <div class="input-wrapper">
                <input type="text" id="birthDate" placeholder="nn/mm/yyyy">
              </div>
            </div>
            
            <div class="form-group">
              <label>PASSWORD</label>
              <div class="input-wrapper">
                <input type="password" id="password" placeholder="Create a strong password" required>
              </div>
            </div>
          </div>

          <!--  BUTTON: Submit  -->
          <!-- FUNCTION: type="submit" - Kích hoạt sự kiện submit của form, gửi dữ liệu đi -->
          <button type="submit" class="submit-btn">CREATE CINEMA ACCOUNT</button>
        </form>

       
        <!-- FUNCTION: Chuyển hướng đến trang login.html khi người dùng đã có tài khoản -->
        <div class="login-link">
          Already have an account? <a href="login.html">Sign in to your account</a>
        </div>
      </div>
    </div>
  </div>

 
  <!-- FILE: signup.html (inline script) -->
  <!-- FUNCTION: Kiểm tra các trường bắt buộc không được để trống trước khi chuyển hướng -->
  <script>
    
    const signupForm = document.getElementById('registerForm');
    if (signupForm) {
      // FUNCTION: addEventListener - Lắng nghe sự kiện submit trên form
      signupForm.addEventListener('submit', function(e) {
        e.preventDefault();  // FUNCTION: preventDefault() - Ngăn không cho form reload lại trang
        
        
        const fullname = document.getElementById('fullName').value;
        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const phone = document.getElementById('phone').value;
        const password = document.getElementById('password').value;
        
        
        if (fullname && username && email && phone && password) {
          alert('Account created successfully! Please login.');
          window.location.href = 'login.html';  
        } else {
          alert('Please fill all required fields');  
        }
      });
    }
  </script>
  
  <!--  FILE: Kết nối Backend  -->
  <!-- FILE: js/api.js - Chứa các hàm gọi API như api.login(), api.register() -->
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  
  
  <!-- FILE: signup.html (inline script) -->
  <!-- FUNCTION: Gọi API register từ backend để tạo tài khoản mới -->
  <script>
    
    
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();  // Chặn reload trang
      
      // MODULE: Thu thập dữ liệu từ các ô input thành object userData
      const userData = {
        fullName: document.getElementById('fullName').value,
        username: document.getElementById('username').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        password: document.getElementById('password').value
      };
      
      const submitBtn = this.querySelector('.submit-btn');
      const originalText = submitBtn.innerHTML;
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ĐANG XỬ LÝ...';
      
      try {
        // FUNCTION: Gọi API register từ backend (định nghĩa trong file api.js)
        await api.register(userData);
        
     
        alert('Đăng ký thành công! Vui lòng đăng nhập.');
        
        // FUNCTION: Chuyển hướng sang trang login sau khi đăng ký thành công
        window.location.href = 'login.html';
      } catch (error) {
   
        alert(error.message || 'Đăng ký thất bại!');
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalText;
      }
    });
  </script>
</body>
</html>
