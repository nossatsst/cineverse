<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Login - CineVerse</title>
  
  <!--  FILE: Nhúng font chữ  -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  
  <style>
    /*  MODULE: RESET CSS */
    /*  Xóa margin/padding mặc định của trình duyệt để giao diện đồng nhất trên mọi trình duyệt */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /*  MODULE: Body */
    /* Thiết lập nền, căn giữa form theo cả chiều dọc và chiều ngang */
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0c10;
      color: #eef2ff;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0f1a, #000);
    }

    /* CLASS: login-container */
    /* Khung chứa toàn bộ form login, giới hạn chiều rộng tối đa 450px, căn giữa màn hình */
    .login-container {
      width: 100%;
      max-width: 450px;
      margin: 20px;
      position: relative;
      z-index: 10;
    }

    /*  CLASS: back-btn  */
    /* Nút quay lại trang chủ, có hiệu ứng di chuyển sang trái khi hover */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: none;
      color: #f87171;
      font-size: 0.875rem;
      cursor: pointer;
      margin-bottom: 20px;
      transition: all 0.3s;
      font-weight: 500;
    }

    .back-btn:hover {
      color: #ef4444;
      transform: translateX(-4px);
    }

    /*  CLASS: login-card  */
    .login-card {
      background: rgba(17, 17, 27, 0.9);
      backdrop-filter: blur(8px);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(220, 38, 38, 0.3);
      animation: borderPulse 3s infinite ease-in-out;
    }

    /*  FUNCTION: borderPulse (Keyframe Animation)  */
    /* Tạo hiệu ứng viền đỏ nhấp nháy cho card login */
    @keyframes borderPulse {
      0% { box-shadow: 0 0 0 1px #dc2626, 0 0 20px 2px rgba(220, 38, 38, 0.3); }
      50% { box-shadow: 0 0 0 2px #dc2626, 0 0 30px 4px rgba(220, 38, 38, 0.5); }
      100% { box-shadow: 0 0 0 1px #dc2626, 0 0 20px 2px rgba(220, 38, 38, 0.3); }
    }

    /* CLASS: card-header-bar  */
    .card-header-bar {
      height: 8px;
      background: linear-gradient(90deg, #b91c1c, #dc2626, #b91c1c);
    }

    /* CLASS: card-content  */
    /* Phần nội dung bên trong card, chứa form và các thành phần */
    .card-content {
      padding: 32px 28px;
    }

    /*  CLASS: login-header */
    /* Phần tiêu đề của form login */
    .login-header {
      text-align: center;
margin-bottom: 28px;
    }

    .login-header h2 {
      font-size: 28px;
      font-family: 'Bebas Neue', cursive;
      letter-spacing: 2px;
      color: white;
    }

    .login-header p {
      color: #fca5a5;
      font-size: 14px;
      margin-top: 6px;
    }

    /*  MODULE: Form Styles*/
    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #fca5a5;
      font-family: 'Bebas Neue', cursive;
      letter-spacing: 1px;
    }

    .input-wrapper {
      position: relative;
    }

    /*  CLASS: input-wrapper input */
    .input-wrapper input {
      width: 100%;
      padding: 12px 40px 12px 16px;
      background: rgba(31, 33, 43, 0.6);
      border: 1px solid #374151;
      border-radius: 12px;
      color: white;
      font-size: 14px;
      transition: all 0.2s;
    }

    .input-wrapper input:focus {
      outline: none;
      border-color: #ef4444;
      box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.2);
    }

   
    .input-icon {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #f87171;
      font-size: 16px;
    }

    /*  CLASS: password-toggle  */
    /* Nút bật/tắt hiển thị mật khẩu, cho phép người dùng kiểm tra mật khẩu trước khi gửi */
    .password-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #f87171;
      cursor: pointer;
      font-size: 16px;
    }

    /* CLASS: submit-btn*/
    /*  Nút đăng nhập */
    .submit-btn {
      width: 100%;
      background: linear-gradient(135deg, #dc2626, #991b1b);
      border: none;
      padding: 14px;
      border-radius: 40px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      font-size: 16px;
      font-family: 'Bebas Neue', cursive;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.3s;
      margin-top: 8px;
    }

    .submit-btn:hover {
      opacity: 0.9;
      transform: scale(1.02);
    }

    /*  CLASS: signup-link  */
    /* Link chuyển hướng đến trang đăng ký tài khoản cho người chưa có tài khoản */
    .signup-link {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: #9ca3af;
    }

    .signup-link a {
      color: #f87171;
      text-decoration: none;
      font-weight: 500;
    }

    .signup-link a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .card-content {
        padding: 24px 20px;
      }
      .login-header h2 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    
   
<!-- FUNCTION: window.location.href - chuyển hướng trình duyệt về trang index.html (trang chủ) -->
    <button class="back-btn" onclick="window.location.href='index.html'">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px; transform: transition;" aria-hidden="true">
        <path d="m12 19-7-7 7-7"></path>
        <path d="M19 12H5"></path>
      </svg>
      Back to Home
    </button>

    <!-- Login Card -->
    <div class="login-card">
      <div class="card-header-bar"></div>
      <div class="card-content">
        
        <!-- Header với icon và tiêu đề -->
        <div class="login-header">
          <div style="display: flex; justify-content: center; align-items: center; margin-bottom: 12px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #ef4444; margin-right: 8px;" aria-hidden="true">
              <rect width="18" height="18" x="3" y="3" rx="2"></rect>
              <path d="M7 3v18"></path>
              <path d="M3 7.5h4"></path>
              <path d="M3 12h18"></path>
              <path d="M3 16.5h4"></path>
              <path d="M17 3v18"></path>
              <path d="M17 7.5h4"></path>
              <path d="M17 16.5h4"></path>
            </svg>
            <h2 style="font-size: 28px; font-family: 'Bebas Neue', cursive; letter-spacing: 2px; color: white;">CINEMA ACCESS</h2>
          </div>
          <p style="color: #fca5a5; font-size: 14px; margin-top: 6px;">Enter your credentials to continue the experience</p>
        </div>

        <!--  FORM: loginForm  -->
        <!-- FILE: login.html - Form đăng nhập chính của hệ thống -->
        <form id="loginForm">
          
          <!-- INPUT GROUP: Email  -->
          <div class="form-group">
            <label for="email">EMAIL ADDRESS</label>
            <div class="input-wrapper">
              <!-- INPUT FIELD: email - Lưu ý có value mặc định "becoolchanh2@gmail.com" để test nhanh -->
              <input type="email" id="email" placeholder="Enter your email" value="becoolchanh2@gmail.com" required>
              <div class="input-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M20.2 6 3 11l-.9-2.4c-.3-1.1.3-2.2 1.3-2.5l13.5-4c1.1-.3 2.2.3 2.5 1.3Z"></path>
                  <path d="m6.2 5.3 3.1 3.9"></path>
                  <path d="m12.4 3.4 3.1 4"></path>
                  <path d="M3 11h18v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"></path>
                </svg>
</div>
            </div>
          </div>

          <!--  INPUT GROUP: Password  -->
          <div class="form-group">
            <label for="password">PASSWORD</label>
            <div class="input-wrapper">
              <input type="password" id="password" placeholder="Enter your password" value="Tacong123" required>
              <button type="button" class="password-toggle" id="togglePassword">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </div>
          </div>

          <!-- FUNCTION: type="submit" - Kích hoạt sự kiện submit của form, gửi dữ liệu đi -->
          <button type="submit" class="submit-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;" aria-hidden="true">
              <path d="M18 8a2 2 0 0 0 0-4 2 2 0 0 0-4 0 2 2 0 0 0-4 0 2 2 0 0 0-4 0 2 2 0 0 0 0 4"></path>
              <path d="M10 22 9 8"></path>
              <path d="m14 22 1-14"></path>
              <path d="M20 8c.5 0 .9.4.8 1l-2.6 12c-.1.5-.7 1-1.2 1H7c-.6 0-1.1-.4-1.2-1L3.2 9c-.1-.6.3-1 .8-1Z"></path>
            </svg>
            ACCESS YOUR ACCOUNT
          </button>
        </form>

        
        <!-- FUNCTION: Chuyển hướng đến trang signup.html khi người dùng chưa có tài khoản -->
        <div class="signup-link">
          Don't have an account? <a href="signup.html">Create one now</a>
        </div>
      </div>
    </div>
  </div>
  <!-- FILE: login.html (inline script) -->
  <!-- FUNCTION: Xử lý sự kiện click vào nút togglePassword để hiện/ẩn mật khẩu -->
  <script>
    // Lấy phần tử nút toggle và ô input password
    const toggleBtn = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');

    if (toggleBtn && passwordInput) {
    
      toggleBtn.addEventListener('click', function() {
        
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        this.innerHTML = type === 'password' 
? '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"></path><circle cx="12" cy="12" r="3"></circle></svg>'
          : '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"></path><path d="M9.5 9.5a3 3 0 0 1 5 5"></path><path d="M2 2l20 20"></path></svg>';
      });
    }
  </script>

  <!--  FILE: Kết nối Backend  -->
  <!-- FILE: js/api.js - Chứa các hàm gọi API như api.login(), api.register() -->
  <script src="js/api.js"></script>
  <!-- FILE: js/auth.js - Chứa các hàm xác thực và quản lý token -->
  <script src="js/auth.js"></script>
  
  <!-- SCRIPT: Xử lý Submit Form -->
  <!-- FILE: login.html (inline script) -->
  <!-- FUNCTION: Xử lý sự kiện submit của form đăng nhập, gọi API, phân quyền và điều hướng -->
  <script>
    const loginForm = document.getElementById('loginForm');
    if (loginForm) {
        // FUNCTION: addEventListener - Lắng nghe sự kiện submit trên form
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();  // FUNCTION: preventDefault() - Ngăn không cho form reload lại trang
            
            // Lấy giá trị từ các ô input
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const submitBtn = this.querySelector('.submit-btn');
            const originalText = submitBtn.innerHTML;
            
            // FUNCTION: Disable nút và hiển thị trạng thái loading để tránh submit nhiều lần
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ĐANG XỬ LÝ...';
            
            try {
               
                const result = await api.login(email, password);
                
                
                alert(`Chào mừng ${result.user.fullName || result.user.username}!`);
                
                if (result.user.role === 'admin') {
                    // Nếu là ADMIN: chuyển đến trang quản trị dashboard
                    window.location.href = 'admin/dashboard.html';
                } else {
                    // Nếu là USER thường: chuyển đến trang người dùng dashboard
                    window.location.href = 'user/dashboard.html';
                }
            } catch (error) {
              
                alert(error.message || 'Đăng nhập thất bại!');
submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        });
    }
  </script>
</body>
</html>
