<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý đặt vé - CineVerse Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0c10; color: #eef2ff; }
        
        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100%;
            background: linear-gradient(180deg, #111827, #0a0c10);
            border-right: 1px solid rgba(220,38,38,0.2);
            padding: 24px 0;
        }
        .sidebar-logo {
            text-align: center;
            margin-bottom: 32px;
            padding: 0 20px;
        }
        .sidebar-logo h2 {
            font-family: 'Pacifico', cursive;
            background: linear-gradient(135deg, #ef4444, #fca5a5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .sidebar-menu {
            list-style: none;
        }
        .sidebar-menu li a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 24px;
            color: #9ca3af;
            text-decoration: none;
            transition: all 0.3s;
        }
        .sidebar-menu li a:hover,
        .sidebar-menu li.active a {
            background: rgba(220,38,38,0.2);
            color: #ef4444;
            border-left: 3px solid #ef4444;
        }
        
        /* Main Content */
        .main-content {
            margin-left: 260px;
            padding: 24px 32px;
        }
        .navbar {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .search-bar {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .search-bar input {
            padding: 10px 16px;
            border-radius: 40px;
            border: 1px solid rgba(220,38,38,0.3);
            background: #1f2937;
            color: white;
            width: 250px;
        }
        .search-bar input::placeholder {
            color: #6b7280;
        }
        .filter-select {
            padding: 10px 16px;
            border-radius: 40px;
            border: 1px solid rgba(220,38,38,0.3);
            background: #1f2937;
            color: white;
            cursor: pointer;
        }
        .logout-btn {
            background: #dc2626;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
        
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #1f2937;
            border-radius: 16px;
            padding: 16px 20px;
            border: 1px solid rgba(220,38,38,0.2);
        }
        .stat-card .label {
            color: #9ca3af;
            font-size: 0.875rem;
            margin-bottom: 8px;
        }
        .stat-card .value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #f5c518;
        }
        
        .bookings-table-container {
            background: #1f2937;
            border-radius: 16px;
            overflow-x: auto;
            border: 1px solid rgba(220,38,38,0.2);
        }
        .bookings-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }
        .bookings-table th,
        .bookings-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .bookings-table th {
            background: rgba(0,0,0,0.3);
            color: #f87171;
            font-weight: 600;
        }
        .bookings-table tr:hover {
            background: rgba(220,38,38,0.1);
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .status-confirmed {
            background: #10b981;
            color: white;
        }
        .status-cancelled {
            background: #ef4444;
            color: white;
        }
        .status-pending {
            background: #f59e0b;
            color: white;
        }
        .cancel-btn {
            background: #dc2626;
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .cancel-btn:hover {
            background: #b91c1c;
        }
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #6b7280;
        }
        
        @media (max-width: 768px) {
            .sidebar { width: 70px; }
            .sidebar span { display: none; }
            .main-content { margin-left: 70px; }
            .search-bar input { width: 150px; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo">
            <h2><i class="fas fa-clapperboard"></i> <span>CineVerse</span></h2>
        </div>
        <ul class="sidebar-menu">
            <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></a></li>
            <li><a href="movies.html"><i class="fas fa-film"></i> <span>Quản lý phim</span></a></li>
            <li class="active"><a href="bookings.html"><i class="fas fa-ticket-alt"></i> <span>Quản lý đặt vé</span></a></li>
            <li><a href="users.html"><i class="fas fa-users"></i> <span>Quản lý người dùng</span></a></li>
        </ul>
    </div>
    
    <div class="main-content">
        <div class="navbar">
            <h3><i class="fas fa-ticket-alt"></i> Quản lý đặt vé</h3>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Tìm kiếm theo phim, mã vé..." onkeyup="filterBookings()">
                <select id="statusFilter" class="filter-select" onchange="filterBookings()">
                    <option value="all">Tất cả trạng thái</option>
                    <option value="confirmed">Đã xác nhận</option>
                    <option value="cancelled">Đã hủy</option>
                    <option value="pending">Chờ xử lý</option>
                </select>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
            </div>
        </div>
        
        <div class="stats-cards" id="statsCards">
            <div class="stat-card"><div class="label">Tổng đặt vé</div><div class="value" id="totalBookings">0</div></div>
            <div class="stat-card"><div class="label">Doanh thu</div><div class="value" id="totalRevenue">₹0</div></div>
            <div class="stat-card"><div class="label">Vé đã bán</div><div class="value" id="totalTickets">0</div></div>
        </div>
        
        <div class="bookings-table-container">
            <table class="bookings-table" id="bookingsTable">
                <thead>
                    <tr>
                        <th>Mã vé</th>
                        <th>Người dùng</th>
                        <th>Phim</th>
                        <th>Suất chiếu</th>
                        <th>Ghế</th>
                        <th>Tổng tiền</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="bookingsTableBody">
                    <tr><td colspan="8" class="empty-state">Đang tải dữ liệu...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        if (!requireAdmin()) throw new Error('Unauthorized');
        
        let allBookings = [];
        let allUsers = [];
        
        // Tải danh sách đặt vé
        async function loadBookings() {
            try {
                allBookings = await api.getAllBookings();
                allUsers = await api.getAllUsers();
                updateStats();
                renderBookingsTable();
            } catch (error) {
                console.error('Error loading bookings:', error);
                document.getElementById('bookingsTableBody').innerHTML = '<tr><td colspan="8" class="empty-state">Lỗi tải dữ liệu: ' + error.message + '</td></tr>';
            }
        }
        
        // Cập nhật thống kê
        function updateStats() {
            const total = allBookings.length;
            const revenue = allBookings.reduce((sum, b) => sum + b.total, 0);
            const tickets = allBookings.reduce((sum, b) => sum + b.seats.length, 0);
            
            document.getElementById('totalBookings').innerText = total;
            document.getElementById('totalRevenue').innerText = `₹${revenue.toLocaleString()}`;
            document.getElementById('totalTickets').innerText = tickets;
        }
        
        // Lấy tên người dùng theo ID
        function getUserName(userId) {
            const user = allUsers.find(u => u.id === userId);
            return user ? (user.fullName || user.username) : userId;
        }
        
        // Format ngày tháng
        function formatDate(dateStr) {
            const d = new Date(dateStr);
            return d.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }
        
        // Lọc và hiển thị bảng
        function filterBookings() {
            renderBookingsTable();
        }
        
        // Render bảng đặt vé
        function renderBookingsTable() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const statusFilter = document.getElementById('statusFilter').value;
            
            let filtered = [...allBookings];
            
            // Lọc theo từ khóa
            if (searchTerm) {
                filtered = filtered.filter(b => 
                    b.id.toLowerCase().includes(searchTerm) ||
                    b.movie.toLowerCase().includes(searchTerm) ||
                    getUserName(b.userId).toLowerCase().includes(searchTerm)
                );
            }
            
            // Lọc theo trạng thái
            if (statusFilter !== 'all') {
                filtered = filtered.filter(b => b.status === statusFilter);
            }
            
            const tbody = document.getElementById('bookingsTableBody');
            
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="empty-state">Không có đặt vé nào</td></tr>';
                return;
            }
            
            tbody.innerHTML = filtered.map(booking => `
                <tr>
                    <td><strong>${booking.id}</strong></td>
                    <td>${getUserName(booking.userId)}</td>
                    <td>${booking.movie}</td>
                    <td>${formatDate(booking.date)}<br><small>${booking.auditorium}</small></td>
                    <td>${booking.seats.join(', ')}</td>
                    <td><strong>₹${booking.total.toLocaleString()}</strong></td>
                    <td><span class="status-badge status-${booking.status}">${booking.status === 'confirmed' ? 'Đã xác nhận' : (booking.status === 'cancelled' ? 'Đã hủy' : 'Chờ xử lý')}</span></td>
                    <td>
                        ${booking.status === 'confirmed' ? `<button class="cancel-btn" onclick="cancelBooking('${booking.id}')"><i class="fas fa-times"></i> Hủy</button>` : '—'}
                    </td>
                </tr>
            `).join('');
        }
        
        // Hủy đặt vé
        async function cancelBooking(bookingId) {
            if (confirm('Bạn có chắc muốn hủy đặt vé này?')) {
                try {
                    await api.cancelBooking(bookingId);
                    alert('Hủy vé thành công!');
                    loadBookings();
                } catch (error) {
                    alert('Hủy vé thất bại: ' + error.message);
                }
            }
        }
        
        // Cập nhật nút auth
        function updateAuthButton() {
            const user = getCurrentUser();
            const logoutBtn = document.querySelector('.logout-btn');
            if (logoutBtn && user) {
                logoutBtn.innerHTML = `<i class="fas fa-sign-out-alt"></i> ${user.fullName || user.username}`;
            }
        }
        
        // Khởi tạo
        updateAuthButton();
        loadBookings();
        
        // Export functions cho global
        window.filterBookings = filterBookings;
        window.cancelBooking = cancelBooking;
        window.logout = logout;
    </script>
</body>
</html>
