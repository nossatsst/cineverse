<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - CineVerse</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0c10; color: #eef2ff; }
        
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100%;
            background: linear-gradient(180deg, #111827, #0a0c10);
            border-right: 1px solid rgba(220,38,38,0.2);
            padding: 24px 0;
        }
        .sidebar-logo { text-align: center; margin-bottom: 32px; }
        .sidebar-logo h2 { font-family: 'Pacifico', cursive; background: linear-gradient(135deg, #ef4444, #fca5a5); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .sidebar-menu { list-style: none; }
        .sidebar-menu li a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 24px;
            color: #9ca3af;
            text-decoration: none;
            transition: all 0.3s;
        }
        .sidebar-menu li a:hover,
        .sidebar-menu li.active a {
            background: rgba(220,38,38,0.2);
            color: #ef4444;
            border-left: 3px solid #ef4444;
        }
        
        .main-content { margin-left: 260px; padding: 24px 32px; }
        .navbar {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: #1f2937;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(220,38,38,0.2);
        }
        .stat-card h3 { color: #9ca3af; font-size: 0.875rem; margin-bottom: 8px; }
        .stat-card .value { font-size: 2rem; font-weight: 700; color: #f5c518; }
        .section-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 20px; color: #ef4444; }
        .recent-table {
            background: #1f2937;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(220,38,38,0.2);
        }
        .recent-table table { width: 100%; border-collapse: collapse; }
        .recent-table th, .recent-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .recent-table th { background: rgba(0,0,0,0.3); color: #f87171; }
        .logout-btn { background: #dc2626; border: none; padding: 8px 20px; border-radius: 40px; color: white; cursor: pointer; }
        
        @media (max-width: 768px) {
            .sidebar { width: 70px; }
            .sidebar span { display: none; }
            .main-content { margin-left: 70px; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo"><h2><i class="fas fa-clapperboard"></i> <span>CineVerse</span></h2></div>
        <ul class="sidebar-menu">
            <li class="active"><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></a></li>
            <li><a href="movies.html"><i class="fas fa-film"></i> <span>Quản lý phim</span></a></li>
            <li><a href="bookings.html"><i class="fas fa-ticket-alt"></i> <span>Quản lý đặt vé</span></a></li>
            <li><a href="users.html"><i class="fas fa-users"></i> <span>Quản lý người dùng</span></a></li>
        </ul>
    </div>
    
    <div class="main-content">
        <div class="navbar">
            <h3><i class="fas fa-tachometer-alt"></i> Admin Dashboard</h3>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
        </div>
        
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card"><h3><i class="fas fa-spinner fa-spin"></i> Đang tải...</h3><div class="value">---</div></div>
        </div>
        
        <h3 class="section-title"><i class="fas fa-history"></i> Đặt vé gần đây</h3>
        <div class="recent-table" id="recentBookings"></div>
    </div>
    
    <script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
    if (!requireAdmin()) throw new Error('Unauthorized');
    
    async function loadStats() {
        try {
            const stats = await api.getAdminStats();
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <h3><i class="fas fa-users"></i> Tổng người dùng</h3>
                    <div class="value">${stats.totalUsers || 0}</div>
                </div>
                <div class="stat-card">
                    <h3><i class="fas fa-film"></i> Tổng phim</h3>
                    <div class="value">${stats.totalMovies || 0}</div>
                </div>
                <div class="stat-card">
                    <h3><i class="fas fa-ticket-alt"></i> Tổng đặt vé</h3>
                    <div class="value">${stats.totalBookings || 0}</div>
                </div>
                <div class="stat-card">
                    <h3><i class="fas fa-dollar-sign"></i> Doanh thu</h3>
                    <div class="value">₹${(stats.totalRevenue || 0).toLocaleString()}</div>
                </div>
                <div class="stat-card">
                    <h3><i class="fas fa-play-circle"></i> Phim đang chiếu</h3>
                    <div class="value">${stats.activeMovies || 0}</div>
                </div>
                <div class="stat-card">
                    <h3><i class="fas fa-calendar-plus"></i> Phim sắp chiếu</h3>
                    <div class="value">${stats.upcomingMovies || 0}</div>
                </div>
            `;
        } catch (error) {
            console.error('Error loading stats:', error);
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <h3>Lỗi tải dữ liệu</h3>
                    <div class="value">---</div>
                </div>
            `;
        }
    }
    
    async function loadRecentBookings() {
        try {
            const bookings = await api.getAllBookings();
            const container = document.getElementById('recentBookings');
            if (!bookings || bookings.length === 0) {
                container.innerHTML = '<div style="padding:40px; text-align:center;">Chưa có đặt vé nào</div>';
                return;
            }
            container.innerHTML = `
                <table class="recent-table">
                    <thead>
                        <tr><th>Mã vé</th><th>Phim</th><th>Ghế</th><th>Tổng tiền</th><th>Ngày đặt</th></tr>
                    </thead>
                    <tbody>
                        ${bookings.slice(0, 10).map(b => `
                            <tr>
                                <td>${b.id || 'N/A'}</td>
                                <td>${b.movie || 'N/A'}</td>
                                <td>${(b.seats || []).join(', ')}</td>
                                <td>₹${(b.total || 0).toLocaleString()}</td>
                                <td>${b.bookingDate ? new Date(b.bookingDate).toLocaleDateString('vi-VN') : 'N/A'}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        } catch (error) {
            console.error('Error loading bookings:', error);
            document.getElementById('recentBookings').innerHTML = '<div style="padding:40px; text-align:center;">Lỗi tải dữ liệu</div>';
        }
    }
    
    // Cập nhật nút logout hiển thị tên user
    function updateUserInfo() {
        const user = getCurrentUser();
        const logoutBtn = document.querySelector('.logout-btn');
        if (logoutBtn && user) {
            logoutBtn.innerHTML = `<i class="fas fa-sign-out-alt"></i> ${user.fullName || user.username}`;
        }
    }
    
    updateUserInfo();
    loadStats();
    loadRecentBookings();
</script>
</body>
</html>
