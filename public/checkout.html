<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Checkout - CineVerse</title>
    
    <!-- THƯ VIỆN BÊN NGOÀI -->
    <script src="https://js.stripe.com/v3/"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* RESET & TOÀN CỤC */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background-color: #f7f7f7; 
            color: #1a1a1a; 
        }
        
        /* NAVBAR */
        .navbar {
            position: fixed;
            left: 16px;
            right: 16px;
            top: 24px;
            z-index: 50;
            transition: all 0.3s;
            padding: 12px 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 24px;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { background: #000; padding: 10px; border-radius: 50%; border: 1px solid #dc2626; }
        .logo-icon i { font-size: 18px; color: #ef4444; }
        .logo-text { font-size: 1.2rem; font-weight: 800; background: linear-gradient(135deg, #ef4444, #fca5a5); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-links { display: flex; gap: 8px; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); border-radius: 9999px; padding: 6px 12px; }
        .nav-link { padding: 10px 20px; border-radius: 9999px; text-decoration: none; color: #d1d5db; font-size: 0.875rem; font-weight: 500; transition: all 0.2s; }
        .nav-link:hover { color: #f5c518; }
        .login-btn { background: linear-gradient(135deg, #374151, #1f2937); border: 1px solid rgba(220,38,38,0.2); padding: 8px 20px; border-radius: 9999px; color: white; font-weight: 600; cursor: pointer; }

        /* CHECKOUT CONTAINER */
        .checkout-container { 
            max-width: 1000px; 
            margin: 100px auto 40px; 
            background: white; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); 
            overflow: hidden; 
        }
        
        .header { 
            padding: 16px 24px; 
            border-bottom: 1px solid #e6e6e6; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        
        .main-content { display: flex; flex-wrap: wrap; }
        
        .order-summary { 
            flex: 1; 
            background-color: #fafafa; 
            padding: 32px 24px; 
            border-right: 1px solid #eaeaea; 
        }
        
        .payment-form-section { flex: 1.2; padding: 32px 28px; }
        
        .product-name { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
        .product-price { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
        
        input, .StripeElement { 
            width: 100%; 
            padding: 12px 14px; 
            font-size: 16px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
        }
        
        .pay-button { 
            width: 100%; 
            background-color: #0074d4; 
            color: white; 
            font-weight: 600; 
            padding: 14px; 
            border: none; 
            border-radius: 500px; 
            cursor: pointer; 
            margin-top: 20px; 
        }
        
        .footer { text-align: center; padding: 20px; border-top: 1px solid #eee; font-size: 12px; color: #888; }
        .status-message { margin-top: 16px; text-align: center; padding: 12px; border-radius: 8px; display: none; }
        .success { background-color: #e0f2e9; color: #0a5c3e; }
        .error { background-color: #fee2e2; color: #b91c1c; }

        @media (max-width: 760px) { 
            .main-content { flex-direction: column; }
            .order-summary { border-right: none; border-bottom: 1px solid #eaeaea; } 
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-clapperboard"></i></div>
                <div class="logo-text">CineVerse</div>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="movies.html" class="nav-link">Movies</a>
                <a href="releases.html" class="nav-link">Releases</a>
                <a href="contact.html" class="nav-link">Contact</a>
                <a href="bookings.html" class="nav-link">Bookings</a>
            </div>
            <button class="login-btn" onclick="window.location.href='login.html'"><i class="fas fa-user"></i> Login</button>
        </div>
    </nav>

    <div class="checkout-container">
        <div class="header">
            <div class="business-info"><a href="#" onclick="history.back()" style="text-decoration:none;">← Quay lại</a></div>
            <div class="sandbox-badge" style="background: #eee; padding: 4px 8px; border-radius: 4px; font-size: 12px;">Thanh toán an toàn</div>
        </div>

        <div class="main-content">
            <!-- Cột 1: Tóm tắt -->
            <div class="order-summary">
                <h2 class="product-name" id="movieName">Đang tải...</h2>
                <div class="product-seats" id="seatInfo">Seats: --</div>
                <div class="product-price" id="totalAmount">0 ₹</div>
                <div style="font-size: 13px; color: #666;">Đã bao gồm thuế</div>
            </div>

            <!-- Cột 2: Form -->
            <div class="payment-form-section">
                <h3 style="margin-bottom: 20px;">Thông tin thanh toán</h3>
                <form id="payment-form">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" placeholder="ban@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Thông tin thẻ</label>
                        <div id="card-element"></div>
                        <div id="card-errors" class="error" style="font-size: 12px; margin-top: 5px;"></div>
                    </div>
                    <div class="form-group">
                        <label>Tên chủ thẻ</label>
                        <input type="text" id="billing-name" placeholder="NGUYEN VAN A">
                    </div>
                    <button id="submit-button" class="pay-button" type="submit">Thanh toán ngay</button>
                    <div id="payment-status" class="status-message"></div>
                    
                    <div style="font-size: 11px; text-align: center; margin-top: 20px; color: #888;">
                        🔐 Thử nghiệm: Thẻ 4242 4242 4242 4242 | CVC 123
                    </div>
                </form>
            </div>
        </div>
        <div class="footer"><span>Powered by <strong>CineVerse Secure Payment</strong></span></div>
    </div>

    <!-- SCRIPTS -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // 1. Lấy dữ liệu từ URL
        const urlParams = new URLSearchParams(window.location.search);
        const movie = urlParams.get('movie') || 'Movie Name';
        const total = parseInt(urlParams.get('total')) || 0;
        const seats = urlParams.get('seats') || 'N/A';

        document.getElementById('movieName').innerText = movie;
        document.getElementById('seatInfo').innerHTML = `Seats: ${seats}`;
        document.getElementById('totalAmount').innerHTML = `${total.toLocaleString('en-IN')} ₹`;

        // 2. Khởi tạo Stripe
        const stripe = Stripe('pk_test_51RcjSlRvJk8vUWZMHPy3tFpRrchHo7cviQz1DuRiZnsZnmqrps3r0x62kGFGBCv37bRWH1NsTbqAa3kWC1P9roWJ00PcYN7G9Q');
        const elements = stripe.elements();
        const cardElement = elements.create('card', { hidePostalCode: true });
        cardElement.mount('#card-element');

        // 3. Xử lý Form
        const form = document.getElementById('payment-form');
        const submitButton = document.getElementById('submit-button');
        const statusDiv = document.getElementById('payment-status');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            submitButton.disabled = true;
            submitButton.textContent = 'Đang xử lý...';

            const email = document.getElementById('email').value;
            const name = document.getElementById('billing-name').value;

            const { paymentMethod, error } = await stripe.createPaymentMethod({
                type: 'card',
                card: cardElement,
                billing_details: { name: name, email: email },
            });

            setTimeout(() => {
                statusDiv.style.display = 'block';
                if (error) {
                    statusDiv.innerHTML = `Lỗi: ${error.message}`;
                    statusDiv.className = 'status-message error';
                    submitButton.disabled = false;
                    submitButton.textContent = 'Thanh toán ngay';
                } else {
                    statusDiv.innerHTML = `✅ Thành công! Mã GD: ${paymentMethod.id.substring(0,8)}...`;
                    statusDiv.className = 'status-message success';
                    submitButton.textContent = 'Đang chuyển hướng...';
                    setTimeout(() => { window.location.href = 'bookings.html'; }, 2000);
                }
            }, 1500);
        });

        // 4. Cập nhật Auth Button
        if (typeof getCurrentUser === 'function') {
            const user = getCurrentUser();
            const authBtn = document.querySelector('.login-btn');
            if (authBtn && user) {
                authBtn.innerHTML = `<i class="fas fa-user-circle"></i> ${user.fullName || user.username}`;
            }
        }
    </script>
</body>
</html>
