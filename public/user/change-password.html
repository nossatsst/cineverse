<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi mật khẩu - CineVerse</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0f1a, #000);
            color: #eef2ff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .change-password-container {
            max-width: 450px;
            width: 100%;
            background: rgba(17, 17, 27, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 32px;
            border: 1px solid rgba(220,38,38,0.3);
        }
        h2 { text-align: center; margin-bottom: 24px; color: #ef4444; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #fca5a5; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px;
            background: rgba(31,33,43,0.6);
            border: 1px solid #374151;
            border-radius: 12px;
            color: white;
            font-size: 14px;
        }
        input:focus { outline: none; border-color: #ef4444; }
        button {
            width: 100%;
            background: linear-gradient(135deg, #dc2626, #991b1b);
            border: none;
            padding: 14px;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            margin-top: 16px;
        }
        button:hover { opacity: 0.9; transform: scale(1.02); }
        .message {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
        }
        .error { background: #fee2e2; color: #b91c1c; }
        .success { background: #e0f2e9; color: #0a5c3e; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #f87171;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="change-password-container">
        <h2><i class="fas fa-key"></i> Đổi mật khẩu</h2>
        <form id="changePasswordForm">
            <div class="form-group">
                <label>Mật khẩu cũ</label>
                <input type="password" id="oldPassword" required>
            </div>
            <div class="form-group">
                <label>Mật khẩu mới</label>
                <input type="password" id="newPassword" required>
            </div>
            <div class="form-group">
                <label>Xác nhận mật khẩu mới</label>
                <input type="password" id="confirmPassword" required>
            </div>
            <button type="submit">Đổi mật khẩu</button>
            <div id="message" class="message" style="display: none;"></div>
        </form>
        <a href="dashboard.html" class="back-link">← Quay lại Dashboard</a>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        if (!requireAuth()) throw new Error('Unauthorized');
        
        document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageDiv = document.getElementById('message');
            
            if (newPassword !== confirmPassword) {
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
                messageDiv.innerHTML = 'Mật khẩu mới và xác nhận không khớp!';
                return;
            }
            
            if (newPassword.length < 6) {
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
                messageDiv.innerHTML = 'Mật khẩu mới phải có ít nhất 6 ký tự!';
                return;
            }
            
            try {
                await api.changePassword(oldPassword, newPassword);
                messageDiv.className = 'message success';
                messageDiv.style.display = 'block';
                messageDiv.innerHTML = '✅ Đổi mật khẩu thành công!';
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
                messageDiv.innerHTML = error.message || 'Đổi mật khẩu thất bại!';
            }
        });
    </script>
</body>
</html>
