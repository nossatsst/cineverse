<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý người dùng - CineVerse Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0c10; color: #eef2ff; }
        
        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100%;
            background: linear-gradient(180deg, #111827, #0a0c10);
            border-right: 1px solid rgba(220,38,38,0.2);
            padding: 24px 0;
        }
        .sidebar-logo {
            text-align: center;
            margin-bottom: 32px;
            padding: 0 20px;
        }
        .sidebar-logo h2 {
            font-family: 'Pacifico', cursive;
            background: linear-gradient(135deg, #ef4444, #fca5a5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .sidebar-menu {
            list-style: none;
        }
        .sidebar-menu li a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 24px;
            color: #9ca3af;
            text-decoration: none;
            transition: all 0.3s;
        }
        .sidebar-menu li a:hover,
        .sidebar-menu li.active a {
            background: rgba(220,38,38,0.2);
            color: #ef4444;
            border-left: 3px solid #ef4444;
        }
        
        /* Main Content */
        .main-content {
            margin-left: 260px;
            padding: 24px 32px;
        }
        .navbar {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .search-bar {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .search-bar input {
            padding: 10px 16px;
            border-radius: 40px;
            border: 1px solid rgba(220,38,38,0.3);
            background: #1f2937;
            color: white;
            width: 250px;
        }
        .search-bar input::placeholder {
            color: #6b7280;
        }
        .add-btn {
            background: #22c55e;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logout-btn {
            background: #dc2626;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
        
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #1f2937;
            border-radius: 16px;
            padding: 16px 20px;
            border: 1px solid rgba(220,38,38,0.2);
        }
        .stat-card .label {
            color: #9ca3af;
            font-size: 0.875rem;
            margin-bottom: 8px;
        }
        .stat-card .value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #f5c518;
        }
        
        .users-table-container {
            background: #1f2937;
            border-radius: 16px;
            overflow-x: auto;
            border: 1px solid rgba(220,38,38,0.2);
        }
        .users-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }
        .users-table th,
        .users-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .users-table th {
            background: rgba(0,0,0,0.3);
            color: #f87171;
            font-weight: 600;
        }
        .users-table tr:hover {
            background: rgba(220,38,38,0.1);
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }
        .role-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .role-admin {
            background: #ef4444;
            color: white;
        }
        .role-user {
            background: #3b82f6;
            color: white;
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .status-active {
            background: #10b981;
            color: white;
        }
        .status-inactive {
            background: #6b7280;
            color: white;
        }
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        .edit-btn, .delete-btn, .toggle-btn {
            padding: 4px 12px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .edit-btn {
            background: #f59e0b;
            color: white;
        }
        .delete-btn {
            background: #dc2626;
            color: white;
        }
        .toggle-btn {
            background: #3b82f6;
            color: white;
        }
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #6b7280;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #1f2937;
            border-radius: 16px;
            padding: 24px;
            width: 90%;
            max-width: 500px;
            border: 1px solid rgba(220,38,38,0.3);
        }
        .modal-content h3 {
            margin-bottom: 20px;
            color: #ef4444;
        }
        .modal-content input,
        .modal-content select {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            background: #374151;
            border: 1px solid #4b5563;
            border-radius: 8px;
            color: white;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        .save-btn {
            background: #22c55e;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 40px;
            flex: 1;
            cursor: pointer;
        }
        .cancel-modal-btn {
            background: #6b7280;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 40px;
            flex: 1;
            cursor: pointer;
        }
        
        @media (max-width: 768px) {
            .sidebar { width: 70px; }
            .sidebar span { display: none; }
            .main-content { margin-left: 70px; }
            .search-bar input { width: 150px; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo">
            <h2><i class="fas fa-clapperboard"></i> <span>CineVerse</span></h2>
        </div>
        <ul class="sidebar-menu">
            <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></a></li>
            <li><a href="movies.html"><i class="fas fa-film"></i> <span>Quản lý phim</span></a></li>
            <li><a href="bookings.html"><i class="fas fa-ticket-alt"></i> <span>Quản lý đặt vé</span></a></li>
            <li class="active"><a href="users.html"><i class="fas fa-users"></i> <span>Quản lý người dùng</span></a></li>
        </ul>
    </div>
    
    <div class="main-content">
        <div class="navbar">
            <h3><i class="fas fa-users"></i> Quản lý người dùng</h3>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Tìm kiếm theo tên, email..." onkeyup="filterUsers()">
                <button class="add-btn" onclick="openAddModal()"><i class="fas fa-plus"></i> Thêm người dùng</button>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
            </div>
        </div>
        
        <div class="stats-cards" id="statsCards">
            <div class="stat-card"><div class="label">Tổng người dùng</div><div class="value" id="totalUsers">0</div></div>
            <div class="stat-card"><div class="label">Người dùng hoạt động</div><div class="value" id="activeUsers">0</div></div>
            <div class="stat-card"><div class="label">Admin</div><div class="value" id="adminCount">0</div></div>
        </div>
        
        <div class="users-table-container">
            <table class="users-table" id="usersTable">
                <thead>
                    <tr>
                        <th>Avatar</th>
                        <th>Họ tên</th>
                        <th>Tên đăng nhập</th>
                        <th>Email</th>
                        <th>Số điện thoại</th>
                        <th>Vai trò</th>
                        <th>Trạng thái</th>
                        <th>Ngày tạo</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <tr><td colspan="9" class="empty-state">Đang tải dữ liệu...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <!-- Modal Thêm/Sửa người dùng -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Thêm người dùng</h3>
            <input type="text" id="userFullName" placeholder="Họ tên">
            <input type="text" id="userUsername" placeholder="Tên đăng nhập">
            <input type="email" id="userEmail" placeholder="Email">
            <input type="tel" id="userPhone" placeholder="Số điện thoại">
            <input type="password" id="userPassword" placeholder="Mật khẩu">
            <select id="userRole">
                <option value="user">Người dùng</option>
                <option value="admin">Quản trị viên</option>
            </select>
            <div class="modal-buttons">
                <button class="save-btn" onclick="saveUser()">Lưu</button>
                <button class="cancel-modal-btn" onclick="closeModal()">Hủy</button>
            </div>
        </div>
    </div>
    
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        if (!requireAdmin()) throw new Error('Unauthorized');
        
        let allUsers = [];
        let editingUserId = null;
        
        // Tải danh sách người dùng
        async function loadUsers() {
            try {
                allUsers = await api.getAllUsers();
                updateStats();
                renderUsersTable();
            } catch (error) {
                console.error('Error loading users:', error);
                document.getElementById('usersTableBody').innerHTML = `<tr><td colspan="9" class="empty-state">Lỗi tải dữ liệu: ${error.message}</td></tr>`;
            }
        }
        
        // Cập nhật thống kê
        function updateStats() {
            const total = allUsers.length;
            const active = allUsers.filter(u => u.status === 'active').length;
            const admin = allUsers.filter(u => u.role === 'admin').length;
            
            document.getElementById('totalUsers').innerText = total;
            document.getElementById('activeUsers').innerText = active;
            document.getElementById('adminCount').innerText = admin;
        }
        
        // Format ngày tháng
        function formatDate(dateStr) {
            if (!dateStr) return 'N/A';
            const d = new Date(dateStr);
            return d.toLocaleDateString('vi-VN');
        }
        
        // Lọc người dùng
        function filterUsers() {
            renderUsersTable();
        }
        
        // Render bảng người dùng
        function renderUsersTable() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            let filtered = [...allUsers];
            
            if (searchTerm) {
                filtered = filtered.filter(u => 
                    (u.fullName && u.fullName.toLowerCase().includes(searchTerm)) ||
                    u.username.toLowerCase().includes(searchTerm) ||
                    u.email.toLowerCase().includes(searchTerm)
                );
            }
            
            const tbody = document.getElementById('usersTableBody');
            
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="empty-state">Không có người dùng nào</td></tr>';
                return;
            }
            
            tbody.innerHTML = filtered.map(user => `
                <tr>
                    <td><img src="${user.avatar || 'https://via.placeholder.com/40'}" class="user-avatar" onerror="this.src='https://via.placeholder.com/40'"></td>
                    <td>${user.fullName || 'N/A'}</td>
                    <td>${user.username}</td>
                    <td>${user.email}</td>
                    <td>${user.phone || 'N/A'}</td>
                    <td><span class="role-badge role-${user.role}">${user.role === 'admin' ? 'Admin' : 'Người dùng'}</span></td>
                    <td><span class="status-badge status-${user.status}">${user.status === 'active' ? 'Hoạt động' : 'Khóa'}</span></td>
                    <td>${formatDate(user.createdAt)}</td>
                    <td class="action-buttons">
                        <button class="edit-btn" onclick="openEditModal('${user.id}')"><i class="fas fa-edit"></i> Sửa</button>
                        <button class="toggle-btn" onclick="toggleUserStatus('${user.id}', '${user.status}')">
                            <i class="fas ${user.status === 'active' ? 'fa-ban' : 'fa-check'}"></i> ${user.status === 'active' ? 'Khóa' : 'Kích hoạt'}
                        </button>
                        ${user.role !== 'admin' ? `<button class="delete-btn" onclick="deleteUser('${user.id}')"><i class="fas fa-trash"></i> Xóa</button>` : ''}
                    </td>
                </tr>
            `).join('');
        }
        
        // Mở modal thêm
        function openAddModal() {
            editingUserId = null;
            document.getElementById('modalTitle').innerText = 'Thêm người dùng';
            document.getElementById('userFullName').value = '';
            document.getElementById('userUsername').value = '';
            document.getElementById('userEmail').value = '';
            document.getElementById('userPhone').value = '';
            document.getElementById('userPassword').value = '';
            document.getElementById('userRole').value = 'user';
            document.getElementById('userModal').style.display = 'flex';
        }
        
        // Mở modal sửa
        async function openEditModal(userId) {
            try {
                const user = allUsers.find(u => u.id === userId);
                if (!user) throw new Error('Không tìm thấy người dùng');
                
                editingUserId = userId;
                document.getElementById('modalTitle').innerText = 'Sửa người dùng';
                document.getElementById('userFullName').value = user.fullName || '';
                document.getElementById('userUsername').value = user.username;
                document.getElementById('userEmail').value = user.email;
                document.getElementById('userPhone').value = user.phone || '';
                document.getElementById('userPassword').value = '';
                document.getElementById('userRole').value = user.role;
                document.getElementById('userModal').style.display = 'flex';
            } catch (error) {
                alert(error.message);
            }
        }
        
        // Lưu người dùng
        async function saveUser() {
            const userData = {
                fullName: document.getElementById('userFullName').value,
                username: document.getElementById('userUsername').value,
                email: document.getElementById('userEmail').value,
                phone: document.getElementById('userPhone').value,
                role: document.getElementById('userRole').value
            };
            
            const password = document.getElementById('userPassword').value;
            if (password) userData.password = password;
            
            try {
                if (editingUserId) {
                    // Cập nhật user
                    await api.updateUser(editingUserId, userData);
                    alert('Cập nhật người dùng thành công!');
                } else {
                    // Thêm user mới
                    if (!userData.password) {
                        alert('Vui lòng nhập mật khẩu');
                        return;
                    }
                    await api.createUser(userData);
                    alert('Thêm người dùng thành công!');
                }
                closeModal();
                loadUsers();
            } catch (error) {
                alert(error.message);
            }
        }
        
        // Khóa/Kích hoạt người dùng
        async function toggleUserStatus(userId, currentStatus) {
            const newStatus = currentStatus === 'active' ? 'inactive' : 'active';
            const action = newStatus === 'active' ? 'kích hoạt' : 'khóa';
            
            if (confirm(`Bạn có chắc muốn ${action} người dùng này?`)) {
                try {
                    await api.updateUser(userId, { status: newStatus });
                    alert(`${action === 'kích hoạt' ? 'Kích hoạt' : 'Khóa'} người dùng thành công!`);
                    loadUsers();
                } catch (error) {
                    alert(error.message);
                }
            }
        }
        
        // Xóa người dùng
        async function deleteUser(userId) {
            if (confirm('Bạn có chắc muốn xóa người dùng này? Hành động này không thể hoàn tác.')) {
                try {
                    await api.deleteUser(userId);
                    alert('Xóa người dùng thành công!');
                    loadUsers();
                } catch (error) {
                    alert(error.message);
                }
            }
        }
        
        // Đóng modal
        function closeModal() {
            document.getElementById('userModal').style.display = 'none';
        }
        
        // Cập nhật nút auth
        function updateAuthButton() {
            const user = getCurrentUser();
            const logoutBtn = document.querySelector('.logout-btn');
            if (logoutBtn && user) {
                logoutBtn.innerHTML = `<i class="fas fa-sign-out-alt"></i> ${user.fullName || user.username}`;
            }
        }
        
        // Khởi tạo
        updateAuthButton();
        loadUsers();
        
        // Export functions cho global
        window.filterUsers = filterUsers;
        window.openAddModal = openAddModal;
        window.openEditModal = openEditModal;
        window.saveUser = saveUser;
        window.toggleUserStatus = toggleUserStatus;
        window.deleteUser = deleteUser;
        window.closeModal = closeModal;
        window.logout = logout;
    </script>
</body>
</html>
